                      🔗 Unir bloques
                    </button>
                  )}
                  {pv.orders.reduce((s,o)=>s+o.products.length,0)>1&&(
                    <button
                      onClick={()=>setSplitProv({name:pv.name, bloque:pv.bloqueLabel, orders:pv.orders})}
                      style={{background:"linear-gradient(135deg,#fb923c,#f97316)",color:"white",border:"none",borderRadius:9,padding:"7px 14px",fontSize:".78rem",fontWeight:800,cursor:"pointer",fontFamily:"'Nunito',sans-serif",display:"flex",alignItems:"center",gap:6,boxShadow:"0 2px 8px rgba(249,115,22,.35)",whiteSpace:"nowrap"}}
                    >✂️ Dividir</button>
                  )}
                  {/* Marcar realizado — solo en sección realizado/recibido */}
                  {showRealizadoBtn && (pv.orders.some(o=>o.status!=="realizado"&&o.status!=="recibido") ? (
                    realizadoProv?.key===pv.key
                      ? <div style={{display:"flex",alignItems:"center",gap:6,background:"#fff7ed",border:"1.5px solid #fed7aa",borderRadius:9,padding:"6px 10px",flexWrap:"wrap"}}>
                          <span style={{fontSize:".72rem",fontWeight:700,color:"#c2410c",whiteSpace:"nowrap"}}>👤 Responsable del pedido:</span>
                          <input
                            autoFocus
                            value={realizadoResp}
                            onChange={e=>setRealizadoResp(e.target.value)}
                            placeholder="Nombre y apellidos…"
                            style={{padding:"4px 9px",border:"1.5px solid #fed7aa",borderRadius:7,fontFamily:"'Nunito',sans-serif",fontSize:".78rem",fontWeight:700,outline:"none",minWidth:160}}
                          />
                          <button
                            onClick={()=>{ if(!realizadoResp.trim()) return; onCambiarStatusBloque(realizadoProv.orders,"realizado",realizadoResp.trim()); setRealizadoProv(null); setRealizadoResp(""); }}
                            disabled={!realizadoResp.trim()}
                            style={{background:realizadoResp.trim()?"#c2410c":"#e5e7eb",color:"white",border:"none",borderRadius:7,padding:"4px 10px",fontSize:".72rem",fontWeight:800,cursor:realizadoResp.trim()?"pointer":"default",fontFamily:"'Nunito',sans-serif",whiteSpace:"nowrap"}}>📦 Confirmar</button>
                          <button onClick={()=>{ setRealizadoProv(null); setRealizadoResp(""); }}
                            style={{background:"white",color:"var(--muted)",border:"1.5px solid var(--border)",borderRadius:7,padding:"4px 8px",fontSize:".72rem",fontWeight:700,cursor:"pointer",fontFamily:"'Nunito',sans-serif"}}>✕</button>
                        </div>
                      : <button onClick={()=>{ setRealizadoProv({key:pv.key, orders:pv.orders}); setRealizadoResp(""); }}
                          style={{background:"linear-gradient(135deg,#fb923c,#c2410c)",color:"white",border:"none",borderRadius:9,padding:"7px 14px",fontSize:".78rem",fontWeight:800,cursor:"pointer",fontFamily:"'Nunito',sans-serif",display:"flex",alignItems:"center",gap:6,boxShadow:"0 2px 8px rgba(194,65,12,.35)",whiteSpace:"nowrap"}}>
                          📦 Pedido realizado
                        </button>
                  ) : pv.orders.every(o=>o.status==="recibido") ? (
                    <span style={{background:"#dcfce7",color:"#15803d",border:"1.5px solid #86efac",borderRadius:9,padding:"7px 14px",fontSize:".78rem",fontWeight:800,display:"flex",alignItems:"center",gap:6,whiteSpace:"nowrap"}}>
                      ✅ Recibido
                    </span>
                  ) : (
                    <span style={{background:"#fff7ed",color:"#c2410c",border:"1.5px solid #fed7aa",borderRadius:9,padding:"7px 14px",fontSize:".78rem",fontWeight:800,display:"flex",alignItems:"center",gap:6,whiteSpace:"nowrap"}}>
                      📦 Realizado
                    </span>
                  ))}
                  <button
                    onClick={()=>{ const dbProv=proveedores.find(p=>p.nombre.toLowerCase()===pv.name.toLowerCase()); generatePedidoExcel(pv.name, pv.orders, dbProv||null); }}
                    style={{background:"linear-gradient(135deg,#22c55e,#16a34a)",color:"white",border:"none",borderRadius:9,padding:"7px 14px",fontSize:".78rem",fontWeight:800,cursor:"pointer",fontFamily:"'Nunito',sans-serif",display:"flex",alignItems:"center",gap:6,boxShadow:"0 2px 8px rgba(34,197,94,.35)",whiteSpace:"nowrap"}}
                  >📥 Descargar Excel</button>
                </div>
              </div>
            </div>
          </div>
          <table className="ptable">
            <thead>
              <tr>
                <th>Artículo</th>
                <th>Código</th>
                <th>URL</th>
                <th>Solicitante</th>
                <th>Uso / Notas</th>
                <th style={{textAlign:"right"}}>Uds.</th>
                <th style={{textAlign:"right"}}>Precio/ud</th>
                <th style={{textAlign:"right"}}>Subtotal</th>
              </tr>
            </thead>
            <tbody>
              {pv.orders.flatMap((o,oi)=>
                o.products.map((p,pi)=>(
                  <tr key={oi+"-"+pi}>
                    <td style={{fontWeight:800}}>{p.nombre}</td>
                    <td style={{color:"var(--muted)",fontSize:".78rem"}}>{p.codigo||"—"}</td>
                    <td>{p.url?<a href={p.url} target="_blank" rel="noreferrer" style={{color:"var(--accent)",fontSize:".75rem",fontWeight:700,textDecoration:"none"}}>🔗 Ver</a>:"—"}</td>
                    <td style={{fontSize:".8rem",color:"var(--muted)",fontWeight:700}}>{o.solicitante||o.responsable}</td>
                    <td style={{fontSize:".78rem",color:"var(--muted)",maxWidth:180,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}} title={o.notas||""}>{o.notas||"—"}</td>
                    <td style={{textAlign:"right"}}>{p.unidades}</td>
                    <td style={{textAlign:"right"}}>{eur(p.precio)}</td>
                    <td style={{textAlign:"right",fontWeight:800,color:"var(--accent)"}}>{eur(p.unidades*p.precio)}</td>
                  </tr>
                ))
              )}
            </tbody>
            <tfoot>
              <tr>
                <td colSpan="7" style={{textAlign:"right",fontWeight:800,fontSize:".75rem",textTransform:"uppercase",letterSpacing:".05em",color:"var(--muted)"}}>Total {pv.bloqueLabel ? pv.name+" · "+pv.bloqueLabel : pv.name}</td>
                <td style={{textAlign:"right",fontWeight:900,color:"var(--accent)",fontSize:"1rem"}}>{eur(pv.total)}</td>
              </tr>
            </tfoot>
          </table>
        </div>
      ))}
      {splitProv&&(
        <SplitOrderModal
          orders={splitProv.orders}
          proveedorName={splitProv.bloque ? splitProv.name+" · "+splitProv.bloque : splitProv.name}
          proyectos={proyectos}
          onClose={()=>setSplitProv(null)}
          onSplit={onDividirPedido}
        />
      )}
      {mergeProv&&(
        <MergeBlocksModal
          proveedorName={mergeProv}
          bloques={bloquesDeProveedor(mergeProv)}
          onClose={()=>setMergeProv(null)}
          onMerge={onUnirBloques}
        />
      )}
    </div>
  );
}

/* ── CATALOG MODAL ── */
function CatalogModal({catalogo,onClose,onAdd}){
  const [search,setSearch]=useState("");
  const [selected,setSelected]=useState({});
  const filtered=catalogo.filter(p=>{ const s=search.toLowerCase(); return !s||p.nombre.toLowerCase().includes(s)||(p.codigo||"").toLowerCase().includes(s)||(p.proveedor||"").toLowerCase().includes(s); });
  const toggle=p=>setSelected(prev=>prev[p.id]?{...prev,[p.id]:undefined}:{...prev,[p.id]:{...p,unidades:1}});
  const setUds=(id,v)=>setSelected(prev=>({...prev,[id]:{...prev[id],unidades:v}}));
  const selList=Object.values(selected).filter(Boolean);
  const confirmAdd=()=>{ if(selList.length===0) return; onAdd(selList.map(p=>({codigo:p.codigo||"",nombre:p.nombre||"",url:p.url||"",unidades:Number(p.unidades)||1,precio:Number(p.precio)||0}))); onClose(); };
  return(
    <div className="catalog-overlay" onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="catalog-modal">
        <div className="catalog-head">
          <h3>📦 Catálogo de productos frecuentes</h3>
          <div className="catalog-search">
            <span className="catalog-search-icon">🔍</span>
            <input placeholder="Buscar por nombre, código, proveedor…" value={search} onChange={e=>setSearch(e.target.value)} autoFocus/>
          </div>
        </div>
        <div className="catalog-body">
          {catalogo.length===0
            ?<div style={{textAlign:"center",padding:"2rem",color:"var(--muted)",fontWeight:600}}>No hay productos en el catálogo todavía.</div>
            :filtered.length===0
            ?<div style={{textAlign:"center",padding:"1.5rem",color:"var(--muted)",fontWeight:600}}>Sin resultados para "{search}"</div>
            :filtered.map(p=>(
              <div key={p.id} className={`catalog-item${selected[p.id]?" selected":""}`} onClick={()=>toggle(p)}>
                <div className="catalog-item-info">
                  <div className="catalog-item-name">{p.nombre}</div>
                  <div className="catalog-item-meta">
                    {p.codigo&&<span>📋 {p.codigo}</span>}
                    {p.proveedor&&<span>🏪 {p.proveedor}</span>}
                    {p.categoria&&<CatTag cat={p.categoria}/>}
                    {p.precio>0&&<span style={{color:"var(--accent)",fontWeight:800}}>{eur(p.precio)}</span>}
                    {p.url&&<a href={p.url} target="_blank" rel="noreferrer" onClick={e=>e.stopPropagation()} style={{color:"var(--accent)"}}>🔗 Ver</a>}
                  </div>
                </div>
                {selected[p.id]&&(
                  <div onClick={e=>e.stopPropagation()} style={{display:"flex",alignItems:"center",gap:6}}>
                    <label style={{fontSize:".72rem",fontWeight:700,color:"var(--muted)"}}>Uds.</label>
                    <input type="number" min="1" value={selected[p.id].unidades} onChange={e=>setUds(p.id,e.target.value)} style={{width:52,padding:"4px 6px",border:"1.5px solid var(--accent)",borderRadius:7,fontFamily:"'Nunito',sans-serif",fontSize:".82rem",fontWeight:700,textAlign:"center"}}/>
                  </div>
                )}
                <div className="catalog-item-check">{selected[p.id]?"✓":""}</div>
              </div>
            ))
          }
        </div>
        <div className="catalog-foot">
          <div className="catalog-selected-count">{selList.length>0?selList.length+" producto"+(selList.length>1?"s":"")+" seleccionado"+(selList.length>1?"s":""):""}</div>
          <div style={{display:"flex",gap:8}}>
            <button className="btn-sec" onClick={onClose}>Cancelar</button>
            <button className="btn-primary" onClick={confirmAdd} style={{opacity:selList.length===0?.5:1}}>Añadir {selList.length>0?"("+selList.length+")":""}</button>
          </div>
        </div>
      </div>
    </div>
  );
}

/* ── PROVEEDOR PICKER (catalog) ── */
function ProveedorPicker({value,onChange,provList}){
  const isOtro=value&&!provList.includes(value);
  const [manual,setManual]=useState(isOtro);
  const handleSelect=e=>{
    if(e.target.value==="__otro__"){ setManual(true); onChange(""); }
    else { onChange(e.target.value); }
  };
  if(provList.length===0||manual){
    return(
      <div style={{display:"flex",gap:6,alignItems:"center"}}>
        <input className="form-input" style={{flex:1}} placeholder="Sigma-Aldrich, VWR…" value={value} onChange={e=>onChange(e.target.value)} autoFocus={manual}/>
        {provList.length>0&&<button type="button" onClick={()=>{setManual(false);onChange("");}} style={{background:"#f1f5f9",color:"var(--muted)",border:"1.5px solid var(--border)",borderRadius:8,padding:"7px 10px",cursor:"pointer",fontSize:".8rem",fontWeight:700,fontFamily:"'Nunito',sans-serif",whiteSpace:"nowrap"}}>← Lista</button>}
      </div>
    );
  }
  return(
    <select className="form-input" value={value} onChange={handleSelect}>
      <option value="">— Sin proveedor —</option>
      {provList.map(p=><option key={p} value={p}>{p}</option>)}
      <option value="__otro__">✏️ Otro (escribir manualmente)…</option>
    </select>
  );
}

/* ── CATALOG ADMIN ── */
function CatalogAdmin({catalogo,setCatalogo,proveedores=[]}){
  const emptyForm={nombre:"",codigo:"",proveedor:"",categoria:"",url:"",precio:""};
  const [showModal,setShowModal]=useState(false);
  const [editing,setEditing]=useState(null);
  const [form,setForm]=useState(emptyForm);
  const [err,setErr]=useState("");
  const [fetching,setFetching]=useState(false);
  const [search,setSearch]=useState("");
  const sf=(k,v)=>setForm(f=>({...f,[k]:v}));
  const openNew=()=>{ setForm(emptyForm); setEditing(null); setErr(""); setShowModal(true); };
  const openEdit=p=>{ setForm({nombre:p.nombre||"",codigo:p.codigo||"",proveedor:p.proveedor||"",categoria:p.categoria||"",url:p.url||"",precio:p.precio||""}); setEditing(p.id); setErr(""); setShowModal(true); };
  const fetchPrice=async()=>{
    if(!form.url.trim()) return setErr("Añade primero la URL del producto.");
    setFetching(true); setErr("");
    try{
      const res=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:300,system:"Extrae datos de productos cientificos. Responde SOLO JSON sin markdown: {\"precio\":numero_o_null,\"nombre\":\"string\",\"codigo\":\"string\"}",messages:[{role:"user",content:"Extrae precio unitario, nombre y codigo de referencia de este producto: "+form.url}]})});
      const data=await res.json();
      const text=data.content?.[0]?.text||"";
      const parsed=JSON.parse(text.replace(/```json|```/g,"").trim());
      if(parsed.precio) sf("precio",String(parsed.precio));
      if(parsed.nombre&&!form.nombre) sf("nombre",parsed.nombre);
      if(parsed.codigo&&!form.codigo) sf("codigo",parsed.codigo);
      if(!parsed.precio) setErr("No se pudo extraer el precio. Introdúcelo manualmente.");
    }catch(e){ setErr("Error al obtener precio. Introdúcelo manualmente."); }
    setFetching(false);
  };
  const save=async()=>{
    if(!form.nombre.trim()) return setErr("El nombre es obligatorio.");
    const fb=getFB();
    if(editing===null){
      const newP={...form,nombre:form.nombre.trim(),precio:Number(form.precio)||0,id:Date.now()};
      if(fb){ await fb.addDoc(fb.collection(fb.db,"catalogo"),newP); } else { setCatalogo(ps=>[...ps,newP]); }
    } else {
      const p=catalogo.find(x=>x.id===editing);
      const upd={...p,...form,nombre:form.nombre.trim(),precio:Number(form.precio)||0};
      if(fb&&p?._docId){ await fb.updateDoc(fb.doc(fb.db,"catalogo",p._docId),upd); } else { setCatalogo(ps=>ps.map(x=>x.id===editing?upd:x)); }
    }
    setShowModal(false);
  };
  const del=async p=>{ if(!confirm("Eliminar "+p.nombre+"?")) return; const fb=getFB(); if(fb&&p._docId){ await fb.deleteDoc(fb.doc(fb.db,"catalogo",p._docId)); } else { setCatalogo(ps=>ps.filter(x=>x.id!==p.id)); } };
  const filtered=catalogo.filter(p=>!search||p.nombre.toLowerCase().includes(search.toLowerCase())||(p.proveedor||"").toLowerCase().includes(search.toLowerCase()));
  return(
    <div>
      <div className="pm-header">
        <div>
          <div className="pm-title">📦 Catálogo de productos frecuentes</div>
          <div className="pm-subtitle">Aparecen como sugerencias al escribir en el formulario, o se añaden directamente desde el catálogo</div>
        </div>
        <div style={{display:"flex",gap:8,alignItems:"center"}}>
          <span style={{background:"#fff8ed",color:"#ea580c",padding:"4px 12px",borderRadius:20,fontSize:".8rem",fontWeight:700}}>{catalogo.length} productos</span>
          <button className="btn-primary" onClick={openNew} style={{fontSize:".82rem",padding:"8px 16px"}}>+ Añadir producto</button>
        </div>
      </div>
      {catalogo.length>0&&<div style={{position:"relative",marginBottom:"1rem"}}><span style={{position:"absolute",left:12,top:"50%",transform:"translateY(-50%)"}}>🔍</span><input className="form-input" style={{paddingLeft:34}} placeholder="Buscar en catálogo…" value={search} onChange={e=>setSearch(e.target.value)}/></div>}
      {catalogo.length===0
        ?<div className="pm-empty">📦 No hay productos todavía. Añade el primero.</div>
        :<div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(290px,1fr))",gap:12}}>
          {filtered.map(p=>(
            <div key={p.id} className="pdb-card">
              <div className="pdb-card-head">
                <div className="pdb-card-name" style={{fontSize:".9rem"}}>{p.nombre}</div>
                {p.precio>0&&<span style={{fontWeight:900,color:"var(--accent)",fontSize:".9rem"}}>{eur(p.precio)}</span>}
              </div>
              <div className="pdb-card-body">
                {p.codigo&&<div className="pdb-field"><span className="pdb-field-lbl">Código</span><span className="pdb-field-val">{p.codigo}</span></div>}
                {p.proveedor&&<div className="pdb-field"><span className="pdb-field-lbl">Proveedor</span><span className="pdb-field-val">{p.proveedor}</span></div>}
                {p.categoria&&<div className="pdb-field"><span className="pdb-field-lbl">Cat.</span><span className="pdb-field-val"><CatTag cat={p.categoria}/></span></div>}
                {p.url&&<div className="pdb-field"><span className="pdb-field-lbl">URL</span><span className="pdb-field-val"><a href={p.url} target="_blank" rel="noreferrer">🔗 Ver</a></span></div>}
              </div>
              <div className="pdb-card-actions"><button className="pdb-btn-edit" onClick={()=>openEdit(p)}>✏️ Editar</button><button className="pdb-btn-del" onClick={()=>del(p)}>🗑️</button></div>
            </div>
          ))}
        </div>
      }
      {showModal&&(
        <div className="pdb-modal-overlay" onClick={e=>e.target===e.currentTarget&&setShowModal(false)}>
          <div className="pdb-modal">
            <h3>{editing===null?"➕ Nuevo producto":"✏️ Editar producto"}</h3>
            {err&&<div className="err-msg" style={{margin:"8px 0"}}>⚠️ {err}</div>}
            <div className="pdb-form-grid" style={{marginTop:12}}>
              <div className="form-group full" style={{marginBottom:0}}><label className="form-label">Nombre <span className="req">*</span></label><input className="form-input" placeholder="Ej: Etanol absoluto 99.8%" value={form.nombre} onChange={e=>sf("nombre",e.target.value)}/></div>
              <div className="form-group" style={{marginBottom:0}}><label className="form-label">Código</label><input className="form-input" placeholder="REF-001" value={form.codigo} onChange={e=>sf("codigo",e.target.value)}/></div>
              <div className="form-group" style={{marginBottom:0}}><label className="form-label">Proveedor habitual</label><ProveedorPicker value={form.proveedor} onChange={v=>sf("proveedor",v)} provList={proveedores.map(p=>p.nombre).sort()}/></div>
              <div className="form-group" style={{marginBottom:0}}><label className="form-label">Categoría</label><select className="form-input" value={form.categoria} onChange={e=>sf("categoria",e.target.value)}><option value="">— Sin categoría —</option>{CATS.map(c=><option key={c.key} value={c.key}>{c.emoji} {c.label}</option>)}</select></div>
              <div className="form-group" style={{marginBottom:0}}><label className="form-label">Precio habitual (€)</label><input className="form-input" type="number" min="0" step="0.01" placeholder="0.00" value={form.precio} onChange={e=>sf("precio",e.target.value)}/></div>
              <div className="form-group full" style={{marginBottom:0}}>
                <label className="form-label">URL <span className="opt">(pega la URL y pulsa "🤖 Auto-precio" para obtener el precio con IA)</span></label>
                <div style={{display:"flex",gap:6}}>
                  <input className="form-input" placeholder="https://www.sigmaaldrich.com/…" value={form.url} onChange={e=>sf("url",e.target.value)} style={{flex:1}}/>
                  <button className={"fetch-btn"+(fetching?" loading":"")} onClick={fetchPrice} disabled={fetching}>{fetching?"⏳ Buscando…":"🤖 Auto-precio"}</button>
                </div>
              </div>
            </div>
            <div className="modal-footer" style={{marginTop:"1.25rem"}}>
              <button className="btn-sec" onClick={()=>setShowModal(false)}>Cancelar</button>
              <button className="btn-primary" onClick={save}>💾 Guardar</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

/* ── PROJECT MANAGER PANEL ── */
function ProjectManager({proyectos,setProyectos}){
  const getFBl=getFB;
  const [name,setName]=useState("");
  const [desc,setDesc]=useState("");
  const [errP,setErrP]=useState("");

  const addProj=async()=>{
    if(!name.trim()) return setErrP("El nombre del proyecto es obligatorio.");
    if(proyectos.find(p=>p.name.toLowerCase()===name.trim().toLowerCase())) return setErrP("Ya existe un proyecto con ese nombre.");
    setErrP("");
    const fb=getFBl(); const newP={id:Date.now(),name:name.trim(),desc:desc.trim(),active:true};
    if(fb){ await fb.addDoc(fb.collection(fb.db,"proyectos"),newP); } else { setProyectos(ps=>[...ps,newP]); }
    setName(""); setDesc("");
  };
  const toggle=async p=>{ const fb=getFBl(); if(fb&&p._docId){ await fb.updateDoc(fb.doc(fb.db,"proyectos",p._docId),{active:!p.active}); } else { setProyectos(ps=>ps.map(x=>x.id===p.id?{...x,active:!x.active}:x)); } };
  const del=async p=>{ const fb=getFBl(); if(fb&&p._docId){ await fb.deleteDoc(fb.doc(fb.db,"proyectos",p._docId)); } else { setProyectos(ps=>ps.filter(x=>x.id!==p.id)); } };

  const active=proyectos.filter(p=>p.active);
  const inactive=proyectos.filter(p=>!p.active);

  return(
    <div>
      <div className="pm-header">
        <div>
          <div className="pm-title">📁 Gestión de Proyectos</div>
          <div className="pm-subtitle">Los proyectos activos aparecen en el resumen por proveedor para asignarlos al pedido</div>
        </div>
        <div style={{display:"flex",gap:8,fontSize:".8rem",color:"var(--muted)",fontWeight:700}}>
          <span style={{background:"#dcfce7",color:"#15803d",padding:"4px 12px",borderRadius:20}}>{active.length} activos</span>
          {inactive.length>0&&<span style={{background:"#f1f5f9",color:"#64748b",padding:"4px 12px",borderRadius:20}}>{inactive.length} archivados</span>}
        </div>
      </div>

      {/* active projects */}
      {active.length===0&&inactive.length===0
        ?<div className="pm-empty">🗂️ No hay proyectos todavía. Añade el primero abajo.</div>
        :<div className="pm-grid">
          {active.map(p=>(
            <div key={p.id} className="pm-card">
              <div className="pm-card-info">
                <div className="pm-card-name">📁 {p.name}</div>
                {p.desc&&<div className="pm-card-desc">{p.desc}</div>}
              </div>
              <div className="pm-card-meta">
                <span className="pm-status-pill active">Activo</span>
                <button className="pm-btn-toggle" onClick={()=>toggle(p)} title="Archivar">📦</button>
                <button className="pm-btn-del" onClick={()=>del(p)} title="Eliminar">✕</button>
              </div>
            </div>
          ))}
        </div>
      }

      {/* archived */}
      {inactive.length>0&&(
        <div style={{marginBottom:"1.25rem"}}>
          <div style={{fontSize:".72rem",fontWeight:800,textTransform:"uppercase",letterSpacing:".05em",color:"var(--muted)",marginBottom:8}}>Archivados</div>
          <div className="pm-grid">
            {inactive.map(p=>(
              <div key={p.id} className="pm-card" style={{opacity:.65}}>
                <div className="pm-card-info">
                  <div className="pm-card-name" style={{color:"var(--muted)"}}>📦 {p.name}</div>
                  {p.desc&&<div className="pm-card-desc">{p.desc}</div>}
                </div>
                <div className="pm-card-meta">
                  <span className="pm-status-pill inactive">Archivado</span>
                  <button className="pm-btn-toggle" onClick={()=>toggle(p)} title="Reactivar" style={{color:"#15803d",borderColor:"#a7f3cc"}}>♻️</button>
                  <button className="pm-btn-del" onClick={()=>del(p)} title="Eliminar">✕</button>
                </div>
              </div>
            ))}
          </div>
        </div>
      )}

      {/* add form */}
      <div className="pm-add-form">
        <div className="pm-add-title">➕ Nuevo proyecto</div>
        {errP&&<div className="err-msg" style={{marginBottom:10}}>⚠️ {errP}</div>}
        <div className="pm-add-row">
          <div className="form-group">
            <label className="form-label">Nombre <span className="req">*</span></label>
            <input className="form-input" placeholder="Ej: TFG María García" value={name} onChange={e=>setName(e.target.value)} onKeyDown={e=>e.key==="Enter"&&addProj()}/>
          </div>
          <div className="form-group">
            <label className="form-label">Descripción <span className="opt">(opcional)</span></label>
            <input className="form-input" placeholder="Breve descripción del proyecto" value={desc} onChange={e=>setDesc(e.target.value)} onKeyDown={e=>e.key==="Enter"&&addProj()}/>
          </div>
          <div style={{paddingBottom:2}}>
            <button className="btn-primary" onClick={addProj} style={{height:42,whiteSpace:"nowrap"}}>+ Añadir</button>
          </div>
        </div>
      </div>
    </div>
  );
}


/* ── EXCEL GENERATOR ── */
function generatePedidoExcel(proveedor, orders, info) {
  const XLSX = window.XLSX;
  if(!XLSX){ alert("Error: librería Excel no cargada"); return; }

  const wb = XLSX.utils.book_new();
  const wsData = [];

  // Row 1: empty
  wsData.push([]);
  // Row 2: title
  wsData.push([null,null,null,null,null,"         SOLICITUD DE PEDIDO"]);
  // Row 3-4: empty
  wsData.push([]); wsData.push([]);
  // Row 5: headers
  wsData.push([null,"Dirección de envío",null,null,null,"Datos de facturación",null,"Datos Proveedor"]);
  // Row 6 — provider name + address line 1
  const pi = info || {};
  wsData.push([null,"Fundación IMDEA Energía",null,null,null,"Fundación IMDEA Energía",null, pi.nombre||proveedor]);
  // Row 7
  wsData.push([null,"Avenida Ramón de la Sagra 3",null,null,null,"Avda. Ramón de la Sagra, 3",null, pi.direccion||""]);
  // Row 8
  wsData.push([null,"Parque Tecnológico de Móstoles",null,null,null,"Parque Tecnológico de Móstoles",null, pi.ciudad ? (pi.cp ? "("+pi.cp+") "+pi.ciudad : pi.ciudad) : ""]);
  // Row 9
  wsData.push([null,"28935 - Móstoles (MADRID)",null,null,null,"28935 Móstoles, Madrid",null, ""]);
  // Row 10
  wsData.push([null,"Tel:  91 737 1135",null,null,null,"Tel:  91 737 11 20",null, pi.tel ? "Tel: "+pi.tel : ""]);
  // Row 11
  wsData.push([null,null,null,null,null,"C.I.F: G-84912716",null, pi.fax ? "Fax: "+pi.fax : ""]);
  // Row 12
  wsData.push([null,"Att.: ",null,null,null,null,null, pi.nif ? "NIF: "+pi.nif : ""]);
  // Row 12b — email (H12)
  // email added separately via cell write below
  // Row 13
  wsData.push([null,"Unidad:","UPTQ (PLANTA PILOTO o Laboratorio PLANTA 2)"]);
  // Row 14: empty
  wsData.push([]);
  // Row 15: date and order number
  const today = new Date().toLocaleDateString("es-ES");
  wsData.push([null,"FECHA: ",today,null,null,"Nº PEDIDO:","P-XXXXX"]);
  // Row 16: empty
  wsData.push([]);
  // Row 17: table headers
  wsData.push([null,"ITEM","CANTIDAD","REFERENCIA","DESCRIPCION",null,null,null,"PRECIO UNITARIO","DTO.","TOTAL Iva no Incl"]);
  // Row 18: empty (merged with 17)
  wsData.push([]);

  // Rows 19+: items — flatten all products from all orders
  let itemNum = 1;
  const firstItemRow = 19;
  let currentRow = firstItemRow;
  const itemRows = [];

  orders.forEach(order => {
    order.products.forEach(p => {
      wsData.push([
        null,
        itemNum,
        Number(p.unidades)||0,
        p.codigo||"",
        p.nombre||"",
        null, null, null,
        Number(p.precio)||0,
        0,
        null  // formula added separately
      ]);
      itemRows.push(currentRow);
      itemNum++;
      currentRow++;
    });
  });

  // Fill up to at least 10 item rows
  while(itemNum <= 10) {
    wsData.push([null, itemNum, null, null, null, null, null, null, null, null, null]);
    itemRows.push(currentRow);
    itemNum++;
    currentRow++;
  }

  const lastItemRow = currentRow - 1;

  // Subtotal row
  wsData.push([null,null,null,null,null,null,null,null,"SUBTOTAL",null,null]);
  const subtotalRow = currentRow; currentRow++;
  // IVA row
  wsData.push([null,null,null,null,null,null,null,null,"IVA",0.21,null]);
  const ivaRow = currentRow; currentRow++;
  // TOTAL row
  wsData.push([null,null,null,null,null,null,null,null,"TOTAL",null,null]);
  const totalRow = currentRow; currentRow++;
  // Plazo / forma pago
  wsData.push([null,null,"PLAZO DE ENTREGA:",null,null,null,null,"Sello de la empresa:"]);
  wsData.push([null,null,"Forma de Pago:"]);

  const ws = XLSX.utils.aoa_to_sheet(wsData);

  // Helper to set yellow fill on a cell
  function yellowCell(ws, addr, value){
    if(!ws[addr]) ws[addr] = {};
    ws[addr].v = value;
    ws[addr].t = "s";
    ws[addr].s = { fill: { fgColor: { rgb: "FFFF00" } } };
  }

  // H12 = email pedidos (yellow)
  yellowCell(ws, "H12", pi.email ? "email pedidos: "+pi.email : "email pedidos:");

  // Add formulas for item totals and subtotal/iva/total
  itemRows.forEach(r => {
    ws["K"+r] = { f: "+(C"+r+"*I"+r+")-(C"+r+"*I"+r+"*J"+r+")", t:"n" };
  });
  ws["K"+subtotalRow] = { f: "SUM(K"+firstItemRow+":K"+lastItemRow+")", t:"n" };
  ws["K"+ivaRow]      = { f: "+K"+subtotalRow+"*J"+ivaRow, t:"n" };
  ws["K"+totalRow]    = { f: "+K"+subtotalRow+"+K"+ivaRow, t:"n" };

  // Merges (mirroring template)
  ws["!merges"] = [
    {s:{r:4,c:1},e:{r:4,c:3}},   // B5:D5
    {s:{r:5,c:1},e:{r:5,c:3}},   // B6:D6
    {s:{r:6,c:1},e:{r:6,c:3}},   // B7:D7
    {s:{r:7,c:1},e:{r:7,c:4}},   // B8:E8
    {s:{r:8,c:1},e:{r:8,c:4}},   // B9:E9
    {s:{r:9,c:1},e:{r:9,c:4}},   // B10:E10
    {s:{r:4,c:7},e:{r:4,c:10}},  // H5:K5
    {s:{r:14,c:2},e:{r:14,c:3}}, // C15:D15
    {s:{r:14,c:6},e:{r:14,c:8}}, // G15:I15
    {s:{r:16,c:1},e:{r:17,c:1}}, // B17:B18
    {s:{r:16,c:2},e:{r:17,c:2}}, // C17:C18
    {s:{r:16,c:3},e:{r:17,c:3}}, // D17:D18
    {s:{r:16,c:4},e:{r:17,c:7}}, // E17:H18
    {s:{r:16,c:8},e:{r:17,c:8}}, // I17:I18
    {s:{r:16,c:9},e:{r:17,c:9}}, // J17:J18
    {s:{r:16,c:10},e:{r:17,c:10}},// K17:K18
  ];

  // Mark H6:H12 yellow (provider data cells)
  ["H6","H7","H8","H9","H10","H11"].forEach(addr=>{
    if(ws[addr]){
      ws[addr].s = { fill: { fgColor: { rgb: "FFFF00" } } };
    } else {
      ws[addr] = { v:"", t:"s", s:{ fill: { fgColor: { rgb: "FFFF00" } } } };
    }
  });

  // Column widths
  ws["!cols"] = [
    {wch:2},    // A
    {wch:8},    // B ITEM
    {wch:12},   // C CANTIDAD
    {wch:20},   // D REFERENCIA
    {wch:30},   // E DESCRIPCIÓN
    {wch:8},{wch:8},{wch:8}, // F G H
    {wch:14},   // I PRECIO
    {wch:9},    // J DTO
    {wch:16},   // K TOTAL
  ];

  XLSX.utils.book_append_sheet(wb, ws, "Hoja 1");
  const filename = "Pedido_"+proveedor.replace(/[^a-zA-Z0-9]/g,"_")+".xlsx";
  XLSX.writeFile(wb, filename, {cellStyles:true});
}

/* ── PROVIDER DATABASE ── */
function ProviderDB({proveedores,setProveedores}){
  const emptyForm = {nombre:"",direccion:"",ciudad:"",cp:"",tel:"",fax:"",nif:"",email:""};
  const [showModal,setShowModal] = useState(false);
  const [editing,setEditing]     = useState(null); // null=new, id=edit
  const [form,setForm]           = useState(emptyForm);
  const [err,setErr]             = useState("");

  const sf=(k,v)=>setForm(f=>({...f,[k]:v}));

  const openNew=()=>{ setForm(emptyForm); setEditing(null); setErr(""); setShowModal(true); };
  const openEdit=p=>{ setForm({nombre:p.nombre||"",direccion:p.direccion||"",ciudad:p.ciudad||"",cp:p.cp||"",tel:p.tel||"",fax:p.fax||"",nif:p.nif||"",email:p.email||""}); setEditing(p.id); setErr(""); setShowModal(true); };

  const save=async()=>{
    if(!form.nombre.trim()) return setErr("El nombre del proveedor es obligatorio.");
    const fb=getFB();
    if(editing===null){
      // new
      const exists=proveedores.find(p=>p.nombre.toLowerCase()===form.nombre.trim().toLowerCase());
      if(exists) return setErr("Ya existe un proveedor con ese nombre.");
      const newP={...form,nombre:form.nombre.trim(),id:Date.now()};
      if(fb){ await fb.addDoc(fb.collection(fb.db,"proveedores"),newP); }
      else { setProveedores(ps=>[...ps,newP]); }
    } else {
      // edit
      const p=proveedores.find(x=>x.id===editing);
      const updated={...p,...form,nombre:form.nombre.trim()};
      if(fb&&p?._docId){ await fb.updateDoc(fb.doc(fb.db,"proveedores",p._docId),updated); }
      else { setProveedores(ps=>ps.map(x=>x.id===editing?updated:x)); }
    }
    setShowModal(false);
  };

  const del=async p=>{
    if(!confirm("¿Eliminar proveedor "+p.nombre+"?")) return;
    const fb=getFB();
    if(fb&&p._docId){ await fb.deleteDoc(fb.doc(fb.db,"proveedores",p._docId)); }
    else { setProveedores(ps=>ps.filter(x=>x.id!==p.id)); }
  };

  const fields = [
    {k:"nombre",  lbl:"Nombre *",        full:true,  ph:"Nombre comercial del proveedor"},
    {k:"nif",     lbl:"NIF/CIF",         full:false, ph:"B12345678"},
    {k:"email",   lbl:"Email pedidos",   full:false, ph:"pedidos@proveedor.com"},
    {k:"tel",     lbl:"Teléfono",        full:false, ph:"+34 91 000 0000"},
    {k:"fax",     lbl:"Fax",            full:false, ph:"+34 91 000 0001"},
    {k:"direccion",lbl:"Dirección",      full:true,  ph:"Calle, número"},
    {k:"cp",      lbl:"C.P.",           full:false, ph:"28000"},
    {k:"ciudad",  lbl:"Ciudad",         full:false, ph:"Madrid"},
  ];

  return(
    <div>
      <div className="pm-header">
        <div>
          <div className="pm-title">🏪 Base de datos de proveedores</div>
          <div className="pm-subtitle">La info de cada proveedor se usa para rellenar automáticamente el Excel de pedido</div>
        </div>
        <div style={{display:"flex",gap:8,alignItems:"center"}}>
          <span style={{background:"#eef4ff",color:"#2563eb",padding:"4px 12px",borderRadius:20,fontSize:".8rem",fontWeight:700}}>{proveedores.length} proveedores</span>
          <button className="btn-primary" onClick={openNew} style={{fontSize:".82rem",padding:"8px 16px"}}>+ Añadir proveedor</button>
        </div>
      </div>

      {proveedores.length===0
        ?<div className="pm-empty">🏪 No hay proveedores todavía. Añade el primero.</div>
        :<div className="pdb-grid">
          {proveedores.map(p=>(
            <div key={p.id} className="pdb-card">
              <div className="pdb-card-head">
                <div className="pdb-card-name">🏪 {p.nombre}</div>
                {p.nif&&<span style={{fontSize:".7rem",fontWeight:700,color:"var(--muted)"}}>{p.nif}</span>}
              </div>
              <div className="pdb-card-body">
                {p.email&&<div className="pdb-field"><span className="pdb-field-lbl">Email</span><span className="pdb-field-val"><a href={"mailto:"+p.email}>{p.email}</a></span></div>}
                {p.tel&&<div className="pdb-field"><span className="pdb-field-lbl">Tel.</span><span className="pdb-field-val">{p.tel}</span></div>}
                {p.fax&&<div className="pdb-field"><span className="pdb-field-lbl">Fax</span><span className="pdb-field-val">{p.fax}</span></div>}
                {p.direccion&&<div className="pdb-field"><span className="pdb-field-lbl">Dirección</span><span className="pdb-field-val">{p.direccion}{p.cp?" · "+p.cp:""}{p.ciudad?" · "+p.ciudad:""}</span></div>}
                {!p.email&&!p.tel&&!p.direccion&&<div style={{fontSize:".78rem",color:"var(--muted)",fontStyle:"italic"}}>Sin datos de contacto</div>}
              </div>
              <div className="pdb-card-actions">
                <button className="pdb-btn-edit" onClick={()=>openEdit(p)}>✏️ Editar</button>
                <button className="pdb-btn-del" onClick={()=>del(p)}>🗑️</button>
              </div>
            </div>
          ))}
        </div>
      }

      {showModal&&(
        <div className="pdb-modal-overlay" onClick={e=>e.target===e.currentTarget&&setShowModal(false)}>
          <div className="pdb-modal">
            <h3>{editing===null?"➕ Nuevo proveedor":"✏️ Editar proveedor"}</h3>
            <div className="yellow-hint">⭐ Los campos completados se rellenarán automáticamente en el Excel de pedido (celdas amarillas)</div>
            {err&&<div className="err-msg" style={{margin:"10px 0"}}>⚠️ {err}</div>}
            <div className="pdb-form-grid" style={{marginTop:14}}>
              {fields.map(f=>(
                <div key={f.k} className={"form-group"+(f.full?" full":"")} style={{marginBottom:0}}>
                  <label className="form-label">{f.lbl}</label>
                  <input className="form-input" placeholder={f.ph} value={form[f.k]} onChange={e=>sf(f.k,e.target.value)}/>
                </div>
              ))}
            </div>
            <div className="modal-footer" style={{marginTop:"1.25rem"}}>
              <button className="btn-sec" onClick={()=>setShowModal(false)}>Cancelar</button>
              <button className="btn-primary" onClick={save}>💾 Guardar</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

/* ── POR PROVEEDOR ACTIVO (lista pedidos, pre-gestión) ── */
const ACTIVE_STATUSES = ["pendiente","revision","aprobado","proceso"];
function PorProveedorActivo({orders, onCambiarStatusBloque}){
  const [enviandoProv, setEnviandoProv] = useState(null); // confirm inline

  // Only show pendiente — the others are already in progress
  const active = orders.filter(o=>o.status==="pendiente");
  const provMap = {};
  active.forEach(o=>{
    const k = o.proveedor||"Sin proveedor";
    if(!provMap[k]) provMap[k]=[];
    provMap[k].push(o);
  });
  const pvList = Object.entries(provMap)
    .map(([name,ords])=>({name, orders:ords, total:ords.reduce((s,o)=>s+tot(o.products),0)}))
    .sort((a,b)=>b.total-a.total);

  if(pvList.length===0) return(
    <div style={{textAlign:"center",padding:"2rem",color:"var(--muted)",fontWeight:600,fontSize:".9rem"}}>
      No hay pedidos pendientes por agrupar.
    </div>
  );

  return(
    <div style={{display:"flex",flexDirection:"column",gap:"1rem",marginTop:"1rem"}}>
      <div style={{background:"#eff6ff",border:"1.5px solid #bfdbfe",borderRadius:10,padding:"10px 14px",fontSize:".8rem",color:"#1d4ed8",fontWeight:700,display:"flex",alignItems:"center",gap:8}}>
        📋 Aquí se agrupan los pedidos pendientes por proveedor. Al pulsar "Enviar al jefe" el pedido pasa a <b>Por gestionar</b> para que el responsable asigne proyecto y apruebe.
      </div>
      {pvList.map(pv=>{
        const nItems = pv.orders.reduce((s,o)=>s+o.products.length,0);
        const solicitantes = [...new Set(pv.orders.map(o=>o.solicitante||o.responsable))];
        const isOpen = enviandoProv===pv.name;
        return(
          <div key={pv.name} style={{background:"white",borderRadius:14,border:"1.5px solid var(--border)",boxShadow:"var(--shadow)",overflow:"hidden"}}>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:".9rem 1.2rem",flexWrap:"wrap",gap:10}}>
              <div>
                <div style={{fontWeight:900,fontSize:"1rem",color:"var(--navy)",display:"flex",alignItems:"center",gap:8}}>
                  🏪 {pv.name}
                </div>
                <div style={{fontSize:".73rem",color:"var(--muted)",fontWeight:600,marginTop:3}}>
                  {pv.orders.length} solicitud{pv.orders.length!==1?"es":""} · {nItems} artículo{nItems!==1?"s":""} · {solicitantes.slice(0,3).join(", ")}{solicitantes.length>3?` +${solicitantes.length-3}`:""}
                </div>
              </div>
              <div style={{display:"flex",alignItems:"center",gap:10,flexWrap:"wrap"}}>
                <div style={{fontWeight:900,fontSize:"1.2rem",color:"var(--accent)",letterSpacing:"-.5px"}}>{eur(pv.total)}</div>
                {isOpen ? (
                  <div style={{display:"flex",alignItems:"center",gap:6,background:"#eff6ff",border:"1.5px solid #bfdbfe",borderRadius:9,padding:"6px 10px"}}>
                    <span style={{fontSize:".72rem",fontWeight:700,color:"#1d4ed8",whiteSpace:"nowrap"}}>¿Enviar al jefe para gestión?</span>
                    <button onClick={()=>{ onCambiarStatusBloque(pv.orders,"revision"); setEnviandoProv(null); }}
                      style={{background:"#1d4ed8",color:"white",border:"none",borderRadius:7,padding:"5px 12px",fontSize:".78rem",fontWeight:800,cursor:"pointer",fontFamily:"'Nunito',sans-serif",whiteSpace:"nowrap"}}>
                      📋 Sí, enviar
                    </button>
                    <button onClick={()=>setEnviandoProv(null)}
                      style={{background:"white",color:"var(--muted)",border:"1.5px solid var(--border)",borderRadius:7,padding:"5px 9px",fontSize:".78rem",fontWeight:700,cursor:"pointer",fontFamily:"'Nunito',sans-serif"}}>✕</button>
                  </div>
                ) : (
                  <button onClick={()=>setEnviandoProv(pv.name)}
                    style={{background:"linear-gradient(135deg,#60a5fa,#1d4ed8)",color:"white",border:"none",borderRadius:9,padding:"7px 14px",fontSize:".78rem",fontWeight:800,cursor:"pointer",fontFamily:"'Nunito',sans-serif",display:"flex",alignItems:"center",gap:6,boxShadow:"0 2px 8px rgba(29,78,216,.3)",whiteSpace:"nowrap"}}>
                    📋 Enviar al jefe
                  </button>
                )}
              </div>

                    <td style={{textAlign:"right",fontWeight:900,color:"var(--accent)",fontSize:"1rem"}}>{eur(pv.total)}</td>
                  </tr>
                </tfoot>
              </table>
            </div>

        );

    </div>
  );
}

                    }}
                    style={{background:"#fef2f2",color:"#dc2626",border:"1.5px solid #fecaca",borderRadius:8,padding:"7px 14px",fontSize:".78rem",fontWeight:800,cursor:"pointer",fontFamily:"'Nunito',sans-serif",whiteSpace:"nowrap"}}>
                    🗑️ Resuelta — no se compra más

                  <button onClick={()=>closeResuelta(o.id)}
                    style={{background:"white",color:"var(--muted)",border:"1.5px solid var(--border)",borderRadius:8,padding:"7px 12px",fontSize:".78rem",fontWeight:700,cursor:"pointer",fontFamily:"'Nunito',sans-serif"}}>

              <tbody>
                {o.products.map((p,i)=>(
                  <tr key={i}>
                    <td style={{fontWeight:800}}>{p.nombre}</td>

                    <td style={{textAlign:"right"}}>{p.unidades}</td>
                    <td style={{textAlign:"right",fontWeight:800,color:"var(--accent)"}}>{eur(p.precio)}</td>

            </table>
          </div>
        );
      })}
    </div>
  );
}

/* ── APP ── */
function App(){
  const { useEffect } = React;
  const [orders,setOrders]       = useState(initialOrders);
  const [proyectos,setProyectos]   = useState([]);
  const [proveedores,setProveedores] = useState([]);
  const [catalogo,setCatalogo]       = useState([]);
  const [filter,setFilter]       = useState("todos");
  const [search,setSearch]       = useState("");
  const [vistaProveedor,setVistaProveedor] = useState(false);
  const [showNew,setShowNew]     = useState(false);
  const [showLogin,setShowLogin] = useState(false);
  const [isAdmin,setIsAdmin]     = useState(false);
  const [selected,setSelected]   = useState(null);
  const [tab,setTab]             = useState("pedidos");
  const [initialDashTab,setInitialDashTab] = useState("gasto");

  const goToProveedorGestion = ()=>{ setTab("resumen"); setInitialDashTab("proveedor"); };
  const [loading,setLoading]     = useState(true);

  useEffect(()=>{
    const iv = setInterval(()=>{
      const fb=getFB(); if(!fb) return;
      clearInterval(iv);
      fb.onSnapshot(fb.collection(fb.db,"orders"),snap=>{
        setOrders(snap.docs.map(d=>({...d.data(),_docId:d.id})));
        setLoading(false);
      });
      fb.onSnapshot(fb.collection(fb.db,"proyectos"),snap=>{
        setProyectos(snap.docs.map(d=>({...d.data(),_docId:d.id})));
      });
      fb.onSnapshot(fb.collection(fb.db,"proveedores"),snap=>{
        setProveedores(snap.docs.map(d=>({...d.data(),_docId:d.id})));
      });
      fb.onSnapshot(fb.collection(fb.db,"catalogo"),snap=>{
        setCatalogo(snap.docs.map(d=>({...d.data(),_docId:d.id})));
      });
    },300);
    return ()=>clearInterval(iv);
  },[]);

  const stats=useMemo(()=>({
    total:    orders.length,
    pendiente:orders.filter(o=>o.status==="pendiente").length,
    proceso:  orders.filter(o=>o.status==="proceso").length,
    realizado:orders.filter(o=>o.status==="realizado").length,
    recibido: orders.filter(o=>o.status==="recibido").length,
  }),[orders]);

  const STATUS_ORDER = {pendiente:0,revision:1,aprobado:2,proceso:3,realizado:4,recibido:5,rechazado:6};
  const filtered=useMemo(()=>orders.filter(o=>{
    if(o.status==="incidencia") return false; // incidencias only shown in their own tab
    if(filter!=="todos"&&o.status!==filter) return false;
    if(search.trim()){const s=search.toLowerCase();return (o.solicitante||o.responsable||"").toLowerCase().includes(s)||o.proveedor.toLowerCase().includes(s)||o.id.toLowerCase().includes(s)||o.products.some(p=>p.nombre.toLowerCase().includes(s))||((o.proyecto||"").toLowerCase().includes(s));}
    return true;
  }).sort((a,b)=>(STATUS_ORDER[a.status]??9)-(STATUS_ORDER[b.status]??9)||(new Date(b.date)-new Date(a.date))),[orders,filter,search]);

  const addOrder = async o=>{
    const fb=getFB();
    if(fb){ await fb.addDoc(fb.collection(fb.db,"orders"),o); }
    else { setOrders(p=>[o,...p]); }
    setShowNew(false);
  };
  const changeStatus=async(id,st,extraFields={})=>{
    const fb=getFB();
    const o=orders.find(x=>x.id===id);
    const update = {status:st, ...extraFields};
    if(fb&&o?._docId){ await fb.updateDoc(fb.doc(fb.db,"orders",o._docId), update); }
    else { setOrders(p=>p.map(x=>x.id===id?{...x,...update}:x)); }
    setSelected(p=>p&&p.id===id?{...p,...update}:p);
  };
  const cambiarStatusBloque=async(bloqueOrders, st, responsable)=>{
    const fb=getFB();
    for(const o of bloqueOrders){
      const extra = {status:st, ...(responsable?{responsable}:{})};
      if(fb&&o._docId){ await fb.updateDoc(fb.doc(fb.db,"orders",o._docId), extra); }
      else { setOrders(p=>p.map(x=>x.id===o.id?{...x,...extra}:x)); }
    }
  };
  const deleteOrder=async(id)=>{
    const fb=getFB();
    const o=orders.find(x=>x.id===id);
    if(fb&&o?._docId){ await fb.deleteDoc(fb.doc(fb.db,"orders",o._docId)); }
    else { setOrders(p=>p.filter(x=>x.id!==id)); }
    setSelected(null);
  };
  const crearIncidencia=async(order, selIdx, nota)=>{
    const fb=getFB();
    const selProds = selIdx.map(i=>order.products[i]);
    const restProds = order.products.filter((_,i)=>!selIdx.includes(i));
    const allSelected = restProds.length===0;
    const ts=Date.now();
    if(allSelected){
      // All items → revert whole order to pendiente, clear project/responsable, append note
      const notaUpd = (order.notas||"") + (order.notas?"\n\n":"") + "[Incidencia: "+nota+"]";
      const upd = {status:"pendiente",proyecto:"",responsable:"",notas:notaUpd};
      if(fb&&order._docId) await fb.updateDoc(fb.doc(fb.db,"orders",order._docId),upd);
      else setOrders(p=>p.map(x=>x.id===order.id?{...x,...upd}:x));
      setSelected(null);
    } else {
      // Partial → create new incidencia order with selected items
      const incId="INC-"+String(ts).slice(-5);
      const incOrder={
        id:incId, date:new Date().toISOString().split("T")[0],
        status:"incidencia",
        category:order.category,
        solicitante:order.solicitante||"",
        responsable:order.responsable||"",
        proveedor:order.proveedor,
        notas:"[Incidencia sobre "+order.id+(order.idinete?" / "+order.idinete:"")+": "+nota+"]",
        proyecto:order.proyecto||"",
        bloque:"",
        idinete:"",
        products:selProds,
        origenId:order.id,
      };
      if(fb){
        await fb.addDoc(fb.collection(fb.db,"orders"),incOrder);
      } else {
        setOrders(p=>[incOrder,...p]);
      }
      setSelected(null);
    }
  };

  const volverPedir=async(incOrder)=>{
    // Create a brand new order from the incidencia, as if user submitted it fresh
    const fb=getFB();
    const ts=Date.now();
    const newId="PED-"+String(ts).slice(-6);
    const newOrder={
      id:newId,
      date:new Date().toISOString().split("T")[0],
      status:"pendiente",
      category:incOrder.category,
      solicitante:incOrder.solicitante||"",
      responsable:"",
      proveedor:incOrder.proveedor,
      notas:"[Nuevo pedido por incidencia de "+incOrder.id+(incOrder.origenId?" / origen: "+incOrder.origenId:"")+"]",
      proyecto:"",
      bloque:"",
      idinete:"",
      products:incOrder.products,
    };
    if(fb){
      // Keep incidencia record but mark it as closed (rechazado so it leaves the tab)
      if(incOrder._docId) await fb.updateDoc(fb.doc(fb.db,"orders",incOrder._docId),{status:"rechazado"});
      await fb.addDoc(fb.collection(fb.db,"orders"),newOrder);
    } else {
      setOrders(p=>[newOrder,...p.map(x=>x.id===incOrder.id?{...x,status:"rechazado"}:x)]);
    }
  };

  const resolverIncidencia=async(incOrder, nuevoStatus, nota)=>{
    const fb=getFB();
    // Find the original order and add the resolution note to it
    const origen = incOrder.origenId ? orders.find(x=>x.id===incOrder.origenId) : null;
    const notaResolucion = "[Incidencia resuelta ("+incOrder.id+"): "+nota+"]";
    if(origen){
      const notaOrigen = (origen.notas||"") + (origen.notas?"\n\n":"") + notaResolucion;
      if(fb&&origen._docId) await fb.updateDoc(fb.doc(fb.db,"orders",origen._docId),{notas:notaOrigen});
      else setOrders(p=>p.map(x=>x.id===origen.id?{...x,notas:notaOrigen}:x));
    }
    // Close the incidencia record itself
    const incUpd = {status:nuevoStatus, notas:(incOrder.notas||"")+(incOrder.notas?"\n\n":"")+notaResolucion};
    if(fb&&incOrder._docId) await fb.updateDoc(fb.doc(fb.db,"orders",incOrder._docId),incUpd);
    else setOrders(p=>p.map(x=>x.id===incOrder.id?{...x,...incUpd}:x));
  };

  const asignarProyecto=async(id,proyecto)=>{
    const fb=getFB();
    const o=orders.find(x=>x.id===id);
    // Only update the project field, status change is handled separately via confirmarProyecto
    if(fb&&o?._docId){ await fb.updateDoc(fb.doc(fb.db,"orders",o._docId),{proyecto}); }
    else { setOrders(p=>p.map(x=>x.id===id?{...x,proyecto}:x)); }
    setSelected(p=>p&&p.id===id?{...p,proyecto}:p);
  };
  const confirmarProyecto=async(ids)=>{
    // Advance orders to "proceso" after confirming project assignment
    const fb=getFB();
    for(const id of ids){
      const o=orders.find(x=>x.id===id);
      if(!o?.proyecto) continue;
      const nuevoStatus="proceso";
      if(fb&&o._docId){ await fb.updateDoc(fb.doc(fb.db,"orders",o._docId),{status:nuevoStatus}); }
      else { setOrders(p=>p.map(x=>x.id===id?{...x,status:nuevoStatus}:x)); }
    }
  };

  const dividirPedido=async({orders:srcOrders, itemsA, itemsB, projA, projB, unassigned, allItems})=>{
    const fb=getFB();
    const now=new Date().toISOString();
    const prodsA=[...itemsA,...unassigned].map(i=>i.product);
    const prodsB=itemsB.map(i=>i.product);
    if(prodsA.length===0||prodsB.length===0) return;

    const base=srcOrders[0];
    const ts=Date.now();
    const idA="PED-"+String(ts).slice(-6)+"A";
    const idB="PED-"+String(ts+1).slice(-6)+"B";

    // Determine block names: if already a block, subdivide it
    const baseBloque = base.bloque || base.proveedor;
    // Strip existing " · Bloque X" suffix to get the root proveedor name
    const rootProv = base.proveedor;
    // Count existing blocks for this proveedor to name the new ones
    const existingBloques = [...new Set(
      orders.filter(o=>o.proveedor===rootProv && o.bloque)
             .map(o=>o.bloque)
    )];
    // Find a base number: if splitting a block that already has a number, branch from it
    const bloqueBase = base.bloque
      ? base.bloque.replace(/ · Bloque .*/,"")
      : rootProv;
    // Find next available block numbers
    const allBloqueNums = orders
      .filter(o=>o.proveedor===rootProv)
      .map(o=>{ const m=(o.bloque||"").match(/Bloque (\d+)$/); return m?parseInt(m[1]):0; });
    const maxN = allBloqueNums.length>0 ? Math.max(...allBloqueNums) : 0;
    const bloqueA = rootProv+" · Bloque "+(maxN+1);
    const bloqueB = rootProv+" · Bloque "+(maxN+2);

    const orderA={
      id:idA, date:now,
      responsable:base.responsable,
      proveedor:rootProv,
      bloque:bloqueA,
      category:base.category,
      notas:base.notas||"",
      status:projA?"proceso":"pendiente",
      proyecto:projA||"",
      products:prodsA,
    };
    const orderB={
      id:idB, date:now,
      responsable:base.responsable,
      proveedor:rootProv,
      bloque:bloqueB,
      category:base.category,
      notas:base.notas||"",
      status:projB?"proceso":"pendiente",
      proyecto:projB||"",
      products:prodsB,
    };

    if(fb){
      for(const o of srcOrders){
        if(o._docId) await fb.deleteDoc(fb.doc(fb.db,"orders",o._docId));
      }
      await fb.addDoc(fb.collection(fb.db,"orders"),orderA);
      await fb.addDoc(fb.collection(fb.db,"orders"),orderB);
    } else {
      setOrders(prev=>{
        const filtered=prev.filter(o=>!srcOrders.find(s=>s.id===o.id));
        return [orderA,orderB,...filtered];
      });
    }
  };

  const unirBloques=async(proveedorName, srcOrders)=>{
    const fb=getFB();
    const now=new Date().toISOString();
    if(!srcOrders || srcOrders.length<2) return;
    const base=srcOrders[0];
    const ts=Date.now();
    const idMerged="PED-"+String(ts).slice(-6)+"M";
    const allProds=srcOrders.flatMap(o=>o.products);
    const merged={
      id:idMerged, date:now,
      responsable:base.responsable,
      proveedor:proveedorName,
      bloque:"",
      category:base.category,
      notas:base.notas||"",
      status:"pendiente",
      proyecto:"",
      products:allProds,
    };
    if(fb){
      for(const o of srcOrders){
        if(o._docId) await fb.deleteDoc(fb.doc(fb.db,"orders",o._docId));
      }
      await fb.addDoc(fb.collection(fb.db,"orders"),merged);
    } else {
      setOrders(prev=>{
        const ids=new Set(srcOrders.map(o=>o.id));
        return [merged,...prev.filter(o=>!ids.has(o.id))];
      });
    }
  };

  const SCARDS=[
    {cls:"sc-pink",  emoji:"📋",num:stats.total,    label:"Total pedidos"},
    {cls:"sc-orange",emoji:"⏳",num:stats.pendiente,label:"Pendientes"},
    {cls:"sc-blue",  emoji:"🔄",num:stats.proceso,  label:"En proceso"},
    {cls:"sc-yellow",emoji:"📦",num:stats.realizado,label:"Realizados"},
    {cls:"sc-green", emoji:"✅",num:stats.recibido, label:"Recibidos"},
  ];

  return(
    <>
      <nav className="navbar">
        <div className="navbar-brand">
          <div className="nav-logo">🛒</div>
          Compras <span className="brand-dot">TQ</span>
        </div>
        <div className="navbar-right">
          {isAdmin
            ?<button className="btn-admin on" onClick={()=>{setIsAdmin(false);setTab("pedidos");setVistaProveedor(false);}}>⚙️ Admin · Salir</button>
            :<button className="btn-admin" onClick={()=>setShowLogin(true)}>🔒 Admin</button>}
          <button className="btn-primary" onClick={()=>setShowNew(true)}>+ Nueva Solicitud</button>
        </div>
      </nav>

      <main className="main">
        {loading&&<div style={{textAlign:"center",padding:"4rem",color:"var(--muted)"}}><div style={{fontSize:"2rem",marginBottom:"0.75rem"}}>⏳</div><div style={{fontWeight:700,fontSize:"1rem"}}>Conectando con la base de datos…</div></div>}
        {!loading&&<>
        {/* stat cards */}
        <div className="stats-grid">
          {SCARDS.map(s=>(
            <div key={s.cls} className={`stat-card ${s.cls}`}>
              <div className="stat-row">
                <div className="stat-num">{s.num}</div>
                <div className="stat-icon-pill">{s.emoji} {s.label}</div>
              </div>
              <div className="stat-label">{s.label}</div>
            </div>
          ))}
        </div>

        {/* Banner avviso capo — pedidos por gestionar */}
        {isAdmin && orders.filter(o=>o.status==="revision").length>0 && (
          <div
            onClick={()=>goToProveedorGestion()}
            style={{cursor:"pointer",background:"linear-gradient(135deg,#eff6ff,#dbeafe)",border:"2px solid #93c5fd",borderRadius:14,padding:"12px 18px",marginBottom:"1rem",display:"flex",alignItems:"center",gap:14,boxShadow:"0 2px 12px rgba(59,130,246,.15)",transition:"transform .15s,box-shadow .15s"}}
            onMouseEnter={e=>{e.currentTarget.style.transform="translateY(-1px)";e.currentTarget.style.boxShadow="0 4px 16px rgba(59,130,246,.25)";}}
            onMouseLeave={e=>{e.currentTarget.style.transform="";e.currentTarget.style.boxShadow="0 2px 12px rgba(59,130,246,.15)";}}
          >
            <div style={{background:"#1d4ed8",borderRadius:10,padding:"8px 10px",fontSize:"1.3rem",flexShrink:0}}>📋</div>
            <div style={{flex:1}}>
              <div style={{fontWeight:900,fontSize:".95rem",color:"#1e3a8a"}}>
                Tienes {orders.filter(o=>o.status==="revision").length} pedido{orders.filter(o=>o.status==="revision").length!==1?"s":""} pendiente{orders.filter(o=>o.status==="revision").length!==1?"s":""} de gestión
              </div>
              <div style={{fontSize:".75rem",color:"#3b82f6",fontWeight:600,marginTop:2}}>
                Asigna proyectos, divide bloques y aprueba en el Resumen → Por proveedor
              </div>
            </div>
            <div style={{background:"#1d4ed8",color:"white",borderRadius:9,padding:"6px 14px",fontSize:".78rem",fontWeight:800,whiteSpace:"nowrap",flexShrink:0}}>
              Ver ahora →
            </div>
          </div>
        )}

        {/* tabs — solo cuando es admin */}
        {isAdmin&&(
          <div className="tabs">
            <button className={`tab-btn${tab==="pedidos"?" act":""}`} onClick={()=>setTab("pedidos")}>📋 Pedidos</button>
            <div className="tab-btn-wrap">
              <button className={`tab-btn${tab==="resumen"?" act":""}`} onClick={()=>setTab("resumen")}>📊 Resumen</button>
              {orders.filter(o=>o.status==="revision").length>0&&<span className="tab-dot">{orders.filter(o=>o.status==="revision").length}</span>}
            </div>
            <button className={`tab-btn${tab==="proyectos"?" act":""}`} onClick={()=>setTab("proyectos")}>📁 Proyectos</button>
            <button className={`tab-btn${tab==="proveedores"?" act":""}`} onClick={()=>setTab("proveedores")}>🏪 Proveedores</button>
            <button className={`tab-btn${tab==="catalogo"?" act":""}`} onClick={()=>setTab("catalogo")}>📦 Catálogo</button>
            <div className="tab-btn-wrap">
              <button className={`tab-btn${tab==="incidencias"?" act":""}`} onClick={()=>setTab("incidencias")} style={tab==="incidencias"?{background:"#d97706",borderColor:"#d97706"}:{}}>⚠️ Incidencias</button>
              {orders.filter(o=>o.status==="incidencia").length>0&&<span className="tab-dot">{orders.filter(o=>o.status==="incidencia").length}</span>}
            </div>
          </div>
        )}

        {/* CONTENT */}
        {tab==="catalogo"&&isAdmin
          ? <CatalogAdmin catalogo={catalogo} setCatalogo={setCatalogo} proveedores={proveedores}/>
          : tab==="proveedores"&&isAdmin
          ? <ProviderDB proveedores={proveedores} setProveedores={setProveedores}/>
          : tab==="proyectos"&&isAdmin
          ? <ProjectManager proyectos={proyectos} setProyectos={setProyectos}/>
          : tab==="incidencias"&&isAdmin
          ? <IncidenciasTab orders={orders} onStatusChange={changeStatus} onVolverPedir={volverPedir} onResuelta={resolverIncidencia} onCerrar={(id)=>changeStatus(id,"rechazado")}/>
          : tab==="resumen"&&isAdmin
          ? <Dashboard orders={orders} proyectos={proyectos} onAsignarProyecto={asignarProyecto} onConfirmarProyecto={confirmarProyecto} onDividirPedido={dividirPedido} onUnirBloques={unirBloques} onCambiarStatusBloque={cambiarStatusBloque} isAdmin={isAdmin} initialDashTab={initialDashTab} proveedores={proveedores}/>
          : (
          <>
            <div className="filters-section">
              <div className="search-wrap">
                <span className="search-icon">🔍</span>
                <input placeholder="Buscar por solicitante, proveedor, proyecto o producto…" value={search} onChange={e=>setSearch(e.target.value)} disabled={vistaProveedor}/>
              </div>
              <div className="filter-pills" style={{display:"flex",flexWrap:"wrap",gap:6,alignItems:"center"}}>
                {!vistaProveedor&&STATUSES.map(s=>(
                  <button key={s.key} className={`filter-btn${filter===s.key?" act":""}`} onClick={()=>setFilter(s.key)}>{s.label}</button>
                ))}
                {isAdmin&&(
                  <button
                    onClick={()=>setVistaProveedor(v=>!v)}
                    style={{marginLeft:"auto",background:vistaProveedor?"linear-gradient(135deg,#6d28d9,#4c1d95)":"linear-gradient(135deg,#a78bfa,#7c3aed)",color:"white",border:"none",borderRadius:9,padding:"7px 15px",fontSize:".8rem",fontWeight:800,cursor:"pointer",fontFamily:"'Nunito',sans-serif",display:"flex",alignItems:"center",gap:6,boxShadow:"0 2px 8px rgba(109,40,217,.3)",whiteSpace:"nowrap"}}>
                    🏪 {vistaProveedor?"← Volver a lista":"Por proveedor"}
                  </button>
                )}
              </div>
            </div>

            {vistaProveedor && isAdmin
              ? <PorProveedorActivo orders={orders} onCambiarStatusBloque={cambiarStatusBloque}/>
              : <div className="orders-list">
              {filtered.length===0
                ?<div className="empty-state"><span className="big">📭</span><p>Todavía no hay solicitudes</p><small>Pulsa "+ Nueva Solicitud" para crear la primera</small></div>
                :(()=>{
                  // Agrupar pedidos del mismo proveedor+bloque cuando están en proceso/realizado/recibido
                  const GROUPED_STATUSES = ["proceso","realizado","recibido"];
                  const groups = [];
                  const usedIds = new Set();
                  filtered.forEach(o=>{
                    if(usedIds.has(o.id)) return;
                    if(GROUPED_STATUSES.includes(o.status)){
                      const groupKey = (o.bloque||o.proveedor)+"__"+o.status;
                      const siblings = filtered.filter(x=>
                        !usedIds.has(x.id) &&
                        x.id !== o.id &&
                        GROUPED_STATUSES.includes(x.status) &&
                        (x.bloque||x.proveedor) === (o.bloque||o.proveedor) &&
                        x.status === o.status
                      );
                      if(siblings.length>0){
                        const allInGroup = [o,...siblings];
                        allInGroup.forEach(x=>usedIds.add(x.id));
                        groups.push({type:"group", key:groupKey, orders:allInGroup});
                      } else {
                        usedIds.add(o.id);
                        groups.push({type:"single", key:o.id, order:o});
                      }
                    } else {
                      usedIds.add(o.id);
                      groups.push({type:"single", key:o.id, order:o});
                    }
                  });
                  return groups.map(entry=>{
                    if(entry.type==="single"){
                      const o = entry.order;
                      return(
                        <div className="order-card" key={o.id} onClick={()=>setSelected(o)}>
                          <div className="order-card-left">
                            <div className="order-meta">
                              <span className="order-id">{o.idinete||o.id}</span>
                              <StatusTag status={o.status}/>
                              <CatTag cat={o.category}/>
                              {isAdmin&&o.proyecto&&<span className="order-proj">📁 {o.proyecto}</span>}
                              <span className="order-date">{fmt(o.date)}</span>
                            </div>
                            <div className="order-info">
                              <span>Solicitante <b>{o.solicitante||o.responsable}</b></span>
                              {o.responsable&&o.responsable!==(o.solicitante||"")&&<span style={{color:"#15803d",fontWeight:700}}>📞 Responsable <b>{o.responsable}</b></span>}
                              <span>Proveedor <b>{o.proveedor}</b></span>
                              <span>Artículos <b>{o.products.length}</b></span>
                            </div>
                            <div className="order-chips">
                              {o.products.slice(0,3).map((p,i)=><span key={i} className="chip">{p.nombre}</span>)}
                              {o.products.length>3&&<span className="chip">+{o.products.length-3} más</span>}
                            </div>
                          </div>
                          {isAdmin&&(
                            <div className="order-right">
                              <div className="order-total-num">{eur(tot(o.products))}</div>
                              <div className="order-total-lbl">total</div>
                            </div>
                          )}
                        </div>
                      );
                    } else {
                      // Tarjeta agrupada: múltiples solicitudes del mismo proveedor
                      const grpOrders = entry.orders;
                      const firstO = grpOrders[0];
                      const totalProds = grpOrders.reduce((s,o)=>s+o.products.length,0);
                      const totalEur = grpOrders.reduce((s,o)=>s+tot(o.products),0);
                      const responsable = firstO.responsable;
                      const isProceso = firstO.status === "proceso";
                      const isRealizado = firstO.status === "realizado";
                      return(
                        <div className="order-card" key={entry.key} style={{cursor:"default"}}>
                          <div className="order-card-left" style={{flex:1}}>
                            {/* Cabecera del pedido agrupado */}
                            <div className="order-meta">
                              <span className="order-id">🏪 {firstO.proveedor}</span>
                              <StatusTag status={firstO.status}/>
                              <CatTag cat={firstO.category}/>
                              {isAdmin&&firstO.proyecto&&<span className="order-proj">📁 {firstO.proyecto}</span>}
                              <span className="order-date">{fmt(firstO.date)}</span>
                            </div>
                            <div className="order-info" style={{marginBottom:8}}>
                              {responsable&&<span style={{color:"#15803d",fontWeight:700}}>👤 Responsable pedido <b>{responsable}</b></span>}
                              <span>Proveedor <b>{firstO.proveedor}</b></span>
                              <span>Artículos <b>{totalProds}</b> de <b>{grpOrders.length}</b> solicitudes</span>
                            </div>
                            {/* Items con solicitante por línea — clicables para abrir detalle */}
                            <div style={{display:"flex",flexDirection:"column",gap:3,marginTop:4,marginBottom:10}}>
                              {grpOrders.map((o,oi)=>
                                o.products.map((p,pi)=>(
                                  <div key={oi+"-"+pi}
                                    onClick={()=>setSelected(o)}
                                    style={{display:"flex",alignItems:"center",gap:8,background:"#f8f7ff",borderRadius:8,padding:"5px 10px",border:"1.5px solid #ede9fe",cursor:"pointer",transition:"all .13s"}}
                                    onMouseEnter={e=>{e.currentTarget.style.background="#f0edff";e.currentTarget.style.borderColor="#a78bfa";}}
                                    onMouseLeave={e=>{e.currentTarget.style.background="#f8f7ff";e.currentTarget.style.borderColor="#ede9fe";}}
                                  >
                                    <span style={{fontWeight:800,fontSize:".82rem",color:"var(--navy)",flex:1,minWidth:0,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{p.nombre}</span>
                                    {p.unidades&&p.unidades!==1&&<span style={{fontSize:".72rem",color:"var(--muted)",fontWeight:700,whiteSpace:"nowrap"}}>×{p.unidades}</span>}
                                    <span style={{fontSize:".72rem",background:"#ede9fe",color:"var(--accent)",borderRadius:20,padding:"2px 8px",fontWeight:700,whiteSpace:"nowrap",flexShrink:0}}>👤 {o.solicitante||o.responsable}</span>
                                    <span style={{fontSize:".65rem",color:"var(--muted)",fontWeight:600,flexShrink:0}}>Ver →</span>
                                  </div>
                                ))
                              )}
                            </div>
                            {/* Acciones del grupo */}
                            {isAdmin && isProceso && (
                              <div style={{display:"flex",gap:8,flexWrap:"wrap",alignItems:"center",paddingTop:6,borderTop:"1.5px solid var(--border)"}}>
                                <span style={{fontSize:".72rem",color:"var(--muted)",fontWeight:700}}>Marcar todo como realizado:</span>
                                {grpOrders.map((o,oi)=>(
                                  <button key={oi} onClick={()=>setSelected(o)}
                                    style={{background:"linear-gradient(135deg,#fb923c,#c2410c)",color:"white",border:"none",borderRadius:8,padding:"5px 12px",fontSize:".75rem",fontWeight:800,cursor:"pointer",fontFamily:"'Nunito',sans-serif",display:"flex",alignItems:"center",gap:5,boxShadow:"0 2px 6px rgba(194,65,12,.3)"}}>
                                    📦 {o.solicitante||o.responsable||o.id}
                                  </button>
                                ))}
                              </div>
                            )}
                            {isAdmin && isRealizado && (
                              <div style={{display:"flex",gap:8,flexWrap:"wrap",alignItems:"center",paddingTop:6,borderTop:"1.5px solid var(--border)"}}>
                                <span style={{fontSize:".72rem",color:"var(--muted)",fontWeight:700}}>Marcar como recibido:</span>
                                {grpOrders.map((o,oi)=>(
                                  <button key={oi} onClick={()=>setSelected(o)}
                                    style={{background:"linear-gradient(135deg,#22c55e,#15803d)",color:"white",border:"none",borderRadius:8,padding:"5px 12px",fontSize:".75rem",fontWeight:800,cursor:"pointer",fontFamily:"'Nunito',sans-serif",display:"flex",alignItems:"center",gap:5,boxShadow:"0 2px 6px rgba(21,128,61,.3)"}}>
                                    ✅ {o.solicitante||o.responsable||o.id}
                                  </button>
                                ))}
                              </div>
                            )}
                          </div>
                          {isAdmin&&(
                            <div className="order-right">
                              <div className="order-total-num">{eur(totalEur)}</div>
                              <div className="order-total-lbl">total</div>
                            </div>
                          )}
                        </div>
                      );
                    }
                  });
                })()
              }
            </div>}
          </>
        )}
        </>}
      </main>
      {showNew   &&<NewRequestModal onClose={()=>setShowNew(false)} onSubmit={addOrder} proyectos={proyectos} proveedores={proveedores} catalogo={catalogo}/>}
      {showLogin &&<LoginModal onClose={()=>setShowLogin(false)} onSuccess={()=>{setIsAdmin(true);setShowLogin(false);}}/>}
      {selected  &&<OrderDetailModal order={selected} isAdmin={isAdmin} onClose={()=>setSelected(null)} onStatusChange={changeStatus} onDelete={deleteOrder} proyectos={proyectos} onAsignarProyecto={asignarProyecto} proveedores={proveedores} onIncidencia={crearIncidencia}/>}
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
